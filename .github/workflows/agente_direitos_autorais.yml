name: Relatório Diário de Direitos Autorais e IA

on:
  schedule:
    - cron: '30 1 * * *'
  workflow_dispatch:

jobs:
  run-ai-agent:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11' # Atualizado para evitar avisos de expiração

      - name: Instalar dependências
        run: |
          python -m pip install --upgrade pip
          pip install -q -U google-genai # Instalando a biblioteca nova

      - name: Executar o Script
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          EMAIL_USER: ${{ secrets.EMAIL_USER }}
          EMAIL_PASS: ${{ secrets.EMAIL_PASS }}
          EMAIL_RECEIVER: ${{ secrets.EMAIL_RECEIVER }}
        run: python schedule-reports.py
