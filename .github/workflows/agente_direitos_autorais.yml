name: Relatório Diário de Direitos Autorais e IA

on:
  schedule:
    # 22:30 Brasília = 01:30 UTC (do dia seguinte)
    - cron: '30 1 * * *'
  
  # Botão mágico para testar agora mesmo!
  workflow_dispatch:

jobs:
  run-ai-agent:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Instalar dependências
        run: |
          python -m pip install --upgrade pip
          pip install -q -U google-generativeai

      - name: Executar o Script
        env:
          # Esses nomes devem ser IGUAIS aos que você salvou nos Secrets do GitHub
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          EMAIL_USER: ${{ secrets.EMAIL_USER }}
          EMAIL_PASS: ${{ secrets.EMAIL_PASS }}
          EMAIL_RECEIVER: ${{ secrets.EMAIL_RECEIVER }}
        run: python schedule-reports.py
